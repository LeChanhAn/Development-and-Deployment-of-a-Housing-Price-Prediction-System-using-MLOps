sonar.projectKey=LeChanhAn_Development-and-Deployment-of-a-Housing-Price-Prediction-System-using-MLOps
sonar.organization=lechanhan

# Tên hiển thị của project trên SonarQube dashboard
sonar.projectName=Housing Price Prediction MLOps
sonar.projectVersion=1.0

# Đường dẫn đến thư mục chứa source code chính cần scan
sonar.sources=src, app.py

# Đường dẫn đến thư mục chứa code test
sonar.tests=tests

sonar.python.version=3.10

# Chỉ định đường dẫn tới file report coverage (được sinh ra bởi bước pytest --cov-report=xml trong ci.yml)
sonar.python.coverage.reportPaths=coverage.xml

# Loại trừ các thư mục/file không cần thiết ra khỏi quá trình scan code quality
sonar.exclusions=models/**, notebooks/**, terraform/**, **/*.ipynb, **/*.pkl, uv.lock, .venv/**, __pycache__/**

# Bỏ qua việc tính coverage cho các file/thư mục này (chỉ scan code smell, không đòi hỏi viết test)
sonar.coverage.exclusions=app.py, src/batch/run_monthly.py