name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'                  
      - 'app.py'                  
      - 'Dockerfile'              
      - 'Dockerfile.streamlit'    
      - 'pyproject.toml'          
      - 'uv.lock'                 
      - 'models/**'               
      - '.github/workflows/ci.yml' 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      # OIDC Role 
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::770353436964:role/github-actions-cicd-oidc-mlops-housing-project-role
          aws-region: ap-southeast-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Build and push housing-api image
      - name: Build, Tag, and Push housing-api
        run: |
          IMAGE_TAG=${GITHUB_SHA}
          ECR_REGISTRY=${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY=housing-api

          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -f Dockerfile .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      # Build and push housing-streamlit image
      - name: Build, Tag, and Push housing-ui
        run: |
          IMAGE_TAG=${GITHUB_SHA}
          ECR_REGISTRY=${{ steps.login-ecr.outputs.registry }} 
          ECR_REPOSITORY=housing-ui

          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -f Dockerfile.streamlit .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      # Deploy to ECS - API
      - name: Deploy housing-api-service
        run: |
          aws ecs update-service \
            --cluster housing-mlops-cluster \
            --service housing-api-service \
            --force-new-deployment

      # Deploy to ECS - Streamlit
      - name: Deploy housing-ui-service
        run: |
          aws ecs update-service \
            --cluster housing-mlops-cluster \
            --service housing-ui-service \
            --force-new-deployment